<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6a102b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="GRE Vocab Quiz" />
  <title>GRE Vocab Adaptive Quiz</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>GRE Vocab Adaptive Quiz</h1>
      <p class="sub">Interactive quiz for Lists 1-14. Missed words return faster until you master them.</p>
    </header>

    <section class="panel controls">
      <div class="row two-col">
        <div>
          <label>Quiz Mode</label>
          <select id="quizType">
            <option value="mixed">Mixed</option>
            <option value="word_to_group">Word -> Meaning Group</option>
            <option value="group_to_word">Meaning Group -> Word</option>
          </select>
        </div>
        <div>
          <label>Questions</label>
          <input id="questionCount" type="number" min="5" max="200" value="30" />
        </div>
      </div>

      <div class="row two-col">
        <div>
          <label>List Preset</label>
          <select id="listPreset">
            <option value="all">All Lists (1-14)</option>
            <option value="first4">Starter (1-4)</option>
            <option value="first8">Core (1-8)</option>
            <option value="last6">Advanced (9-14)</option>
            <option value="custom">Custom Range</option>
          </select>
        </div>
        <div>
          <label>From / To</label>
          <div class="range-wrap">
            <select id="listStart"></select>
            <span>to</span>
            <select id="listEnd"></select>
          </div>
        </div>
      </div>

      <div class="row">
        <p id="listPreview" class="list-preview"></p>
      </div>

      <div class="row checkbox-row">
        <label><input id="stuckOnly" type="checkbox" /> Focus only on stuck words</label>
      </div>

      <div class="actions">
        <button id="startBtn">Start Quiz</button>
        <button id="resetStatsBtn" class="secondary">Reset Learning Stats</button>
      </div>
    </section>

    <section id="quizPanel" class="panel hidden">
      <div class="stats">
        <span id="qInfo"></span>
        <span id="scoreInfo"></span>
        <span id="accuracyInfo"></span>
      </div>

      <div class="progress-wrap"><div id="progressBar" class="progress-bar"></div></div>

      <h2 id="prompt"></h2>
      <div id="choices" class="choices"></div>

      <div id="feedback" class="feedback"></div>
      <div id="familyHint" class="family"></div>

      <div class="actions">
        <button id="nextBtn" disabled>Next</button>
        <button id="endBtn" class="secondary">End Quiz</button>
      </div>
    </section>

    <section id="summaryPanel" class="panel hidden">
      <h3>Session Summary</h3>
      <p id="summaryText"></p>
      <div id="stuckWords" class="chips"></div>
    </section>
  </main>

  <script src="./words.js"></script>
  <script src="./app.js"></script>
</body>
</html>
